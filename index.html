<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Rental PS">
<meta name="theme-color" content="#ef4444">
<title>Billing Rental MANTUL PS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="icon.png">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

header{
background:#445eef;
padding:15px;
font-size:22px;

}

}

}

}

.start{background:#22c55e}
.pause{background:#f59e0b}
.bayar{background:#3b82f6}

.menu{

}

justify-content:space-between;
align-items:center;
background:#334155;
padding:5px;

}

.qty{

gap:5px;
}

table{

margin-top:20px;
border-collapse:collapse;
}

padding:8px;

}

}

header{
font-size:18px;

</head>

<body>

<header>BILLING RENTAL MANTUL PLAYSTATION</header>

<div class="dashboard">

<div class="card">
Total Pendapatan
<h2 id="totalPend">0</h2>
</div>

<div class="card">
Hari Ini
<h2 id="todayPend">0</h2>
</div>

</div>

<div class="container" id="psContainer"></div>

<div style="padding:15px">

<h3>Riwayat Transaksi</h3>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>PS</th>
<th>Nama</th>
<th>Total</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<script>

const psList=[
{nama:"PS1",tipe:"PS3"},
{nama:"PS2",tipe:"PS3"},
{nama:"PS3",tipe:"PS3"},
{nama:"PS4",tipe:"PS4"},
{nama:"PS5",tipe:"PS4"}
]

const hargaPS3={1:5000,2:10000,3:13000,5:22000}
const hargaPS4={1:8000,2:15000,3:22000,5:38000}

let dataPS=JSON.parse(localStorage.getItem("dataPS"))||psList.map(()=>({
nama:"",
jam:1,
detik:0,
jalan:false,
snack:{},
}))

let transaksi=JSON.parse(localStorage.getItem("trans"))||[]
let pendapatan=parseInt(localStorage.getItem("pend"))||0

const menu=[
{nama:"Pop Mie",harga:7000},
{nama:"Chuba",harga:1000},
{nama:"Chitato Lite",harga:2000},
{nama:"Good Time",harga:2000},
{nama:"Oreo",harga:2000},
{nama:"Beng Beng",harga:3000},
{nama:"Kapal Api",harga:5000},
{nama:"Good Day",harga:5000},
{nama:"Tea Jus",harga:3000},
{nama:"Teh Tarik",harga:7000},
{nama:"Nutrisari",harga:5000}
]

function format(w){

let h=Math.floor(w/3600)
let m=Math.floor((w%3600)/60)
let s=w%60

return String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0')

}

function hargaMain(i){

let tipe=psList[i].tipe
let jam=dataPS[i].jam

if(tipe=="PS3")return hargaPS3[jam]
else return hargaPS4[jam]

}

function snackTotal(snack){

let total=0

for(let i in snack){

let m=menu[i]

total+=m.harga*snack[i]

}

return total

}

function tambahSnack(ps,index){

dataPS[ps].snack[index]=(dataPS[ps].snack[index]||0)+1

save()
render()

}

function kurangSnack(ps,index){

if(dataPS[ps].snack[index]){

dataPS[ps].snack[index]--

if(dataPS[ps].snack[index]<=0)delete dataPS[ps].snack[index]

}

save()
render()

}

function start(i){
dataPS[i].jalan = true
save()
}

function pause(i){
dataPS[i].jalan = false
save()
}

function resetTimer(i){

dataPS[i].detik = 0
dataPS[i].jalan = false
dataPS[i].snack = {}
dataPS[i].nama = ""
dataPS[i].jam = 1

save()
render()

}

function bayar(i){

let total=hargaMain(i)+snackTotal(dataPS[i].snack)

pendapatan+=total

let now=new Date()

transaksi.push({
tanggal:now.toLocaleString(),
ps:psList[i].nama,
nama:dataPS[i].nama,
total
})

cetak(i,total)

dataPS[i]={nama:"",jam:1,detik:0,jalan:false,snack:{}}

save()
render()

}

function cetak(i,total){

let w=window.open("","","width=300")

w.document.write(`
<h3>RENTAL PS</h3>
PS : ${psList[i].nama}<br>
Nama : ${dataPS[i].nama}<br>
Paket : ${dataPS[i].jam} Jam<br>
Main : ${hargaMain(i)}<br>
Snack : ${snackTotal(dataPS[i].snack)}<br>
<hr>
TOTAL : ${total}
`)

w.print()

}

function render(){

let html=""

psList.forEach((ps,i)=>{

let snackHTML=""

menu.forEach((m,index)=>{

let qty=dataPS[i].snack[index]||0

snackHTML+=`
<div class="menuItem">

${m.nama}

<div class="qty">

<button onclick="kurangSnack(${i},${index})">-</button>

${qty}

<button onclick="tambahSnack(${i},${index})">+</button>

</div>

</div>
`

})

let total=hargaMain(i)+snackTotal(dataPS[i].snack)

html+=`

<div class="pscard">

<h3>${ps.nama} (${ps.tipe})</h3>

<input 
placeholder="Nama pemain"
value="${dataPS[i].nama || ""}"
oninput="updateNama(${i}, this.value)">

<select onchange="dataPS[${i}].jam=this.value; save();">

<option value="1" ${dataPS[i].jam==1?"selected":""}>1 Jam</option>
<option value="2" ${dataPS[i].jam==2?"selected":""}>2 Jam</option>
<option value="3" ${dataPS[i].jam==3?"selected":""}>3 Jam</option>
<option value="5" ${dataPS[i].jam==5?"selected":""}>5 Jam</option>

</select>

<div class="timer" id="timer${i}">
${format(dataPS[i].detik)}
</div>

<button class="start" onclick="start(${i})">Start</button>
<button class="pause" onclick="pause(${i})">Pause</button>
<button class="reset" onclick="resetTimer(${i})">Reset</button>


<div class="menu">

${snackHTML}

</div>

<h4>Total : ${total}</h4>

<button class="bayar" onclick="bayar(${i})">Bayar</button>

</div>

`

})

document.getElementById("psContainer").innerHTML=html

renderHistory()

document.getElementById("totalPend").innerText=pendapatan

}

function renderHistory(){

let html=""

transaksi.forEach(t=>{

html+=`
<tr>
<td>${t.tanggal}</td>
<td>${t.ps}</td>
<td>${t.nama}</td>
<td>${t.total}</td>
</tr>
`

})

document.getElementById("history").innerHTML=html

}

function save(){

localStorage.setItem("dataPS",JSON.stringify(dataPS))
localStorage.setItem("trans",JSON.stringify(transaksi))
localStorage.setItem("pend",pendapatan)

}

function updateNama(index, value){
dataPS[index].nama = value
save()
}

setInterval(()=>{

dataPS.forEach((p,i)=>{

if(p.jalan){

p.detik++

let timerEl = document.getElementById("timer"+i)

if(timerEl){
timerEl.innerText = format(p.detik)
}

}

})

save()

},1000)

render()

</script>

</body>
</html>
